<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Gateway Authentication</title>
    <link rel="stylesheet" href="../../css/style.css">
</head>
<body style="display:flex; justify-content:center; align-items:center; min-height:100vh;">
    <div class="glass-panel complex-glass" style="padding: 40px; width:100%; max-width:400px;">
        <h3>Console Authentication</h3>
        <form action="/admin/login" method="POST" style="margin-top:20px;">
            <div class="input-group">
                <label>Admin User Node</label>
                <input type="text" name="username" required>
            </div>
            <div class="input-group">
                <label>Access Key</label>
                <input type="password" name="password" required>
            </div>
            <button type="submit" class="btn btn-primary" style="width:100%;">Authorize System</button>
        </form>
    </div>
</body>
</html>
